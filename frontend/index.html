<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Symptom Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Symptom Checker</div>
    
    <div class="language-bar">
        <select id="languageSelect">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="mr">Marathi</option>
        </select>
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="message bot" id="welcomeMessage">
Welcome. Please describe your symptoms and know the disease,remedies and precautions 
        </div>
    </div>
    
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your symptoms..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
        <button class="mic-btn" onclick="toggleRecording()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        </button>
    </div>
</div>

<div class="theme-toggle">
    <label class="switch">
        <input type="checkbox" onchange="toggleDarkMode()">
        <span class="slider"></span>
    </label>
</div>

<script src="script.js"></script>
</body>
</html>
